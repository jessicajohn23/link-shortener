<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Link Shortener</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <h1>🔗 Link Shortener</h1>
        
        <form action="/shorten" method="POST">
            <input type="text" name="url" placeholder="Paste a long URL..." required>
            <button type="submit">Shorten</button>
        </form>

        {% if new_link %}
        <div class="result">
            ✅ Short link: <a href="{{ new_link }}" target="_blank">{{ new_link }}</a>
        </div>
        {% endif %}

        <h2>Recent Links</h2>
        <table>
            <thead>
                <tr><th>Short Link</th><th>Original</th><th>Clicks</th><th>Analytics</th></tr>
            </thead>
            <tbody>
            {% for link in links %}
            <tr>
                <td><a href="/{{ link.short_code }}">{{ request.host }}/{{ link.short_code }}</a></td>
                <td class="truncate">{{ link.original_url }}</td>
                <td>{{ link.click_count }}</td>
                <td><a href="/dashboard/{{ link.short_code }}">📊 View</a></td>
            </tr>
            {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
